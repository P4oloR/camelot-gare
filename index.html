<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camelot Gare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
    
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1a472a;
    }
    .login-box {
      background: white; padding: 40px; border-radius: 8px;
      width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .login-box h1 { color: #1a472a; margin-bottom: 8px; font-size: 24px; }
    .login-box p { color: #666; margin-bottom: 24px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 10px 12px; margin-bottom: 12px;
      border: 1px solid #ddd; border-radius: 4px; font-size: 14px;
    }
    .login-box button {
      width: 100%; padding: 12px; background: #1a472a; color: white;
      border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
    }
    .login-box button:hover { background: #2d6a4f; }
    .error-msg { color: red; font-size: 13px; margin-top: 8px; }

    #app-screen { display: none; }
    header {
      background: #1a472a; color: white; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 20px; }
    header button {
      background: rgba(255,255,255,0.2); color: white; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    nav { background: #2d6a4f; display: flex; gap: 0; }
    nav button {
      color: white; border: none; padding: 12px 24px;
      cursor: pointer; font-size: 14px; background: transparent;
      border-bottom: 3px solid transparent;
    }
    nav button.active { border-bottom-color: #f0c040; font-weight: bold; }
    nav button:hover { background: rgba(255,255,255,0.1); }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .section { display: none; }
    .section.active { display: block; }
    
    .card {
      background: white; border-radius: 8px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .card h3 { font-size: 16px; margin-bottom: 4px; color: #1a472a; }
    .card-meta { font-size: 13px; color: #666; margin-bottom: 12px; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .btn {
      padding: 8px 16px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none;
      display: inline-block;
    }
    .btn-primary { background: #1a472a; color: white; }
    .btn-primary:hover { background: #2d6a4f; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-danger:hover { background: #c82333; }
    .btn-warning { background: #f0c040; color: #333; }
    .btn-warning:hover { background: #e0b030; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .btn-info { background: #17a2b8; color: white; }
    .btn-info:hover { background: #138496; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 14px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 8px; padding: 24px;
      width: 90%; max-width: 680px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 16px; color: #1a472a; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1a472a; color: white; padding: 10px 8px; text-align: left; }
    td { padding: 8px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f8f9fa; }

    .slot-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 8px; align-items: end; margin-bottom: 8px;
    }
    .slot-row .form-group { margin-bottom: 0; }
    
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: bold;
    }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-orange { background: #fff3cd; color: #856404; }
    .badge-red { background: #f8d7da; color: #721c24; }

    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .top-bar h2 { font-size: 20px; color: #1a472a; }
    
    .loading { text-align: center; padding: 40px; color: #666; }
    .empty { text-align: center; padding: 40px; color: #999; font-style: italic; }

    /* ESTRATTORE */
    .estrattore-box {
      background: #e8f5e9; border: 2px solid #1a472a; border-radius: 8px;
      padding: 20px; margin-bottom: 20px;
    }
    .estrattore-box h3 { color: #1a472a; margin-bottom: 12px; font-size: 16px; }
    .estrattore-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .estrattore-tabs button {
      padding: 6px 14px; border: 1px solid #1a472a; border-radius: 4px;
      cursor: pointer; font-size: 12px; background: white; color: #1a472a;
    }
    .estrattore-tabs button.active { background: #1a472a; color: white; }
    .estrattore-input textarea, .estrattore-input input {
      width: 100%; padding: 10px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 13px; margin-bottom: 8px;
    }
    .estrattore-input textarea { height: 120px; resize: vertical; }
    .estrattore-stato {
      font-size: 13px; color: #666; font-style: italic; margin-top: 8px;
    }
    .estrattore-stato.ok { color: #28a745; font-style: normal; font-weight: bold; }
    .estrattore-stato.err { color: #dc3545; font-style: normal; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>⚔️ Team Camelot</h1>
    <p>Gestione Gare — accesso riservato</p>
    <input type="text" id="login-user" placeholder="Username (root o team)" />
    <input type="password" id="login-pass" placeholder="Password" />
    <button onclick="doLogin()">Accedi</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <h1>⚔️ Team Camelot — Gestione Gare</h1>
    <button onclick="doLogout()">Esci</button>
  </header>
  <nav>
    <button class="active" onclick="showSection('gare', this)">🏃 Gare</button>
    <button onclick="showSection('iscritti', this)">👥 Iscritti</button>
    <button onclick="showSection('daIscrivere', this)">⚠️ Da Iscrivere</button>
  </nav>

  <div class="container">

    <!-- SEZIONE GARE -->
    <div class="section active" id="section-gare">
      <div class="top-bar">
        <h2>Catalogo Gare</h2>
        <button class="btn btn-primary" onclick="openModalGara()">+ Nuova Gara</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-gare" placeholder="Cerca gara..." oninput="renderGare()" />
      </div>
      <div id="lista-gare"><div class="loading">Caricamento...</div></div>
    </div>

    <!-- SEZIONE ISCRITTI -->
    <div class="section" id="section-iscritti">
      <div class="top-bar">
        <h2>Iscritti</h2>
        <button class="btn btn-primary" onclick="openModalIscritto()">+ Nuovo Iscritto</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-iscritti" placeholder="Cerca iscritto o gara..." oninput="renderIscritti()" />
      </div>
      <div id="lista-iscritti"><div class="loading">Caricamento...</div></div>
    </div>

    <!-- SEZIONE DA ISCRIVERE -->
    <div class="section" id="section-daIscrivere">
      <div class="top-bar">
        <h2>⚠️ Da Iscrivere Ufficialmente</h2>
      </div>
      <div id="lista-daIscrivere"><div class="loading">Caricamento...</div></div>
    </div>

  </div>
</div>

<!-- MODAL GARA -->
<div class="modal-overlay" id="modal-gara">
  <div class="modal">
    <h2 id="modal-gara-title">Nuova Gara</h2>

    <!-- ESTRATTORE AI -->
    <div class="estrattore-box">
      <h3>🤖 Estrai dati con AI</h3>
      <div class="estrattore-tabs">
        <button class="active" onclick="setEstratTab('testo', this)">Testo</button>
        <button onclick="setEstratTab('url', this)">Link URL</button>
      </div>
      <div class="estrattore-input">
        <textarea id="estrat-testo" placeholder="Incolla qui il testo del regolamento..."></textarea>
        <input type="url" id="estrat-url" placeholder="https://www.esempio-gara.it/regolamento" style="display:none;" />
      </div>
      <button class="btn btn-info" onclick="estraiDati()">🔍 Estrai e compila campi</button>
      <div class="estrattore-stato" id="estrat-stato"></div>
    </div>

    <input type="hidden" id="gara-id" />
    <div class="form-group">
      <label>Nome Gara *</label>
      <input type="text" id="gara-nome" placeholder="Es. Maratona di Roma 2026" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data Evento</label>
        <input type="date" id="gara-data" />
      </div>
      <div class="form-group">
        <label>Ora</label>
        <input type="time" id="gara-ora" />
      </div>
    </div>
    <div class="form-group">
      <label>Località</label>
      <input type="text" id="gara-localita" />
    </div>
    <div class="form-group">
      <label>Distanza</label>
      <input type="text" id="gara-distanza" />
    </div>
    <div class="form-group">
      <label>Link Sito Gara</label>
      <input type="url" id="gara-sito" />
    </div>
    <div class="form-group">
      <label>Link Facebook</label>
      <input type="url" id="gara-facebook" />
    </div>
    <div class="form-group">
      <label>Link Regolamento</label>
      <input type="url" id="gara-regolamento" />
    </div>

    <h3 style="margin: 16px 0 8px; color: #1a472a;">Slot Iscrizioni</h3>
    <div id="slots-container"></div>
    <button class="btn btn-secondary" onclick="addSlot()" style="margin-bottom:16px;">+ Aggiungi Slot</button>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-gara')">Annulla</button>
      <button class="btn btn-primary" onclick="salvaGara()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL ISCRITTO -->
<div class="modal-overlay" id="modal-iscritto">
  <div class="modal">
    <h2 id="modal-iscritto-title">Nuovo Iscritto</h2>
    <input type="hidden" id="iscritto-id" />
    <div class="form-group">
      <label>Nominativo *</label>
      <input type="text" id="iscritto-nome" placeholder="Nome Cognome" />
    </div>
    <div class="form-group">
      <label>Gara *</label>
      <select id="iscritto-gara"></select>
    </div>
    <div class="form-group">
      <label>Slot</label>
      <select id="iscritto-slot"></select>
    </div>
    <div class="form-group">
      <label>Stato Iscrizione</label>
      <select id="iscritto-stato">
        <option value="Da iscrivere">Da iscrivere</option>
        <option value="Iscritto ufficialmente">Iscritto ufficialmente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Pagamento</label>
      <select id="iscritto-pagamento">
        <option value="Non pagato">Non pagato</option>
        <option value="Pagato">Pagato</option>
      </select>
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="iscritto-note" rows="3" placeholder="Note aggiuntive..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-iscritto')">Annulla</button>
      <button class="btn btn-primary" onclick="salvaIscritto()">Salva</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://camelot-worker.paolo-ricciotti.workers.dev';
let TOKEN = null;
let gare = [];
let iscritti = [];
let estrattoreTab = 'testo';
let slotCount = 0;

// ===== LOGIN =====
async function doLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value.trim();
  if (!user || !pass) { document.getElementById('login-error').textContent = 'Inserisci username e password.'; return; }
  if (user !== 'root' && user !== 'team') { document.getElementById('login-error').textContent = 'Username non valido.'; return; }
  TOKEN = pass;
  const ok = await testToken();
  if (!ok) { document.getElementById('login-error').textContent = 'Password non corretta.'; TOKEN = null; return; }
  localStorage.setItem('camelot_token', pass);
  avviaApp();
}

async function testToken() {
  try {
    const r = await fetch(`${WORKER_URL}/gare`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    return r.ok;
  } catch { return false; }
}

function doLogout() {
  localStorage.removeItem('camelot_token');
  TOKEN = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function avviaApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  await caricaDati();
}

// ===== API =====
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${WORKER_URL}${path}`, opts);
  return r.json();
}

async function caricaDati() {
  gare = await api('/gare') || [];
  iscritti = await api('/iscritti') || [];
  renderGare();
  renderIscritti();
  renderDaIscrivere();
}

// ===== NAVIGAZIONE =====
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`section-${name}`).classList.add('active');
  btn.classList.add('active');
}

// ===== ESTRATTORE =====
function setEstratTab(tab, btn) {
  estrattoreTab = tab;
  document.querySelectorAll('.estrattore-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('estrat-testo').style.display = tab === 'testo' ? 'block' : 'none';
  document.getElementById('estrat-url').style.display = tab === 'url' ? 'block' : 'none';
}

async function estraiDati() {
  const stato = document.getElementById('estrat-stato');
  stato.textContent = '⏳ Estrazione in corso...';
  stato.className = 'estrattore-stato';

  const testo = estrattoreTab === 'testo' ? document.getElementById('estrat-testo').value.trim() : null;
  const url = estrattoreTab === 'url' ? document.getElementById('estrat-url').value.trim() : null;

  if (!testo && !url) {
    stato.textContent = '⚠️ Inserisci un testo o un URL.';
    stato.className = 'estrattore-stato err';
    return;
  }

  try {
    const result = await api('/estrai', 'POST', { testo, url });

    if (result.error) {
      stato.textContent = `❌ Errore: ${result.error}`;
      stato.className = 'estrattore-stato err';
      return;
    }

    // Compila i campi
    if (result.nome) document.getElementById('gara-nome').value = result.nome;
    if (result.data) document.getElementById('gara-data').value = result.data;
    if (result.ora) document.getElementById('gara-ora').value = result.ora;
    if (result.localita) document.getElementById('gara-localita').value = result.localita;
    if (result.distanza) document.getElementById('gara-distanza').value = result.distanza;
    if (result.sito) document.getElementById('gara-sito').value = result.sito;
    if (result.facebook) document.getElementById('gara-facebook').value = result.facebook;
    if (result.regolamento) document.getElementById('gara-regolamento').value = result.regolamento;

    // Slot
    if (result.slots && result.slots.length > 0) {
      document.getElementById('slots-container').innerHTML = '';
      slotCount = 0;
      result.slots.forEach(s => addSlot(s));
    }

    stato.textContent = '✅ Dati estratti! Controlla e correggi se necessario, poi clicca Salva.';
    stato.className = 'estrattore-stato ok';

  } catch (err) {
    stato.textContent = `❌ Errore: ${err.message}`;
    stato.className = 'estrattore-stato err';
  }
}

// ===== GARE =====
function renderGare() {
  const search = document.getElementById('search-gare').value.toLowerCase();
  const filtered = gare.filter(g => g.nome.toLowerCase().includes(search));
  const el = document.getElementById('lista-gare');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty">Nessuna gara trovata.</div>'; return; }
  el.innerHTML = filtered.map(g => {
    const nIscritti = iscritti.filter(i => i.garaId === g.id).length;
    return `<div class="card">
      <h3>${g.nome}</h3>
      <div class="card-meta">
        📅 ${g.data || 'N/D'} ${g.ora || ''} &nbsp;|&nbsp;
        📍 ${g.localita || 'N/D'} &nbsp;|&nbsp;
        🏃 ${g.distanza || 'N/D'} &nbsp;|&nbsp;
        🎟️ ${(g.slots||[]).length} slot &nbsp;|&nbsp;
        👥 ${nIscritti} iscritti
      </div>
      <div class="card-actions">
        <button class="btn btn-warning" onclick="openModalGara('${g.id}')">✏️ Modifica</button>
        <button class="btn btn-danger" onclick="eliminaGara('${g.id}')">🗑️ Elimina</button>
        ${g.sito ? `<a href="${g.sito}" target="_blank" class="btn btn-secondary">🌐 Sito</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openModalGara(id = null) {
  document.getElementById('slots-container').innerHTML = '';
  document.getElementById('estrat-stato').textContent = '';
  document.getElementById('estrat-testo').value = '';
  document.getElementById('estrat-url').value = '';
  slotCount = 0;

  if (id) {
    const g = gare.find(x => x.id === id);
    document.getElementById('modal-gara-title').textContent = 'Modifica Gara';
    document.getElementById('gara-id').value = g.id;
    document.getElementById('gara-nome').value = g.nome || '';
    document.getElementById('gara-data').value = g.data || '';
    document.getElementById('gara-ora').value = g.ora || '';
    document.getElementById('gara-localita').value = g.localita || '';
    document.getElementById('gara-distanza').value = g.distanza || '';
    document.getElementById('gara-sito').value = g.sito || '';
    document.getElementById('gara-facebook').value = g.facebook || '';
    document.getElementById('gara-regolamento').value = g.regolamento || '';
    (g.slots || []).forEach(s => addSlot(s));
  } else {
    document.getElementById('modal-gara-title').textContent = 'Nuova Gara';
    ['gara-id','gara-nome','gara-data','gara-ora','gara-localita','gara-distanza','gara-sito','gara-facebook','gara-regolamento'].forEach(id => {
      document.getElementById(id).value = '';
    });
    addSlot();
  }
  document.getElementById('modal-gara').classList.add('open');
}

function addSlot(data = null) {
  slotCount++;
  const n = slotCount;
  const div = document.createElement('div');
  div.className = 'slot-row';
  div.id = `slot-${n}`;
  div.innerHTML = `
    <div class="form-group">
      <label>Inizio Slot ${n}</label>
      <input type="date" id="slot-inizio-${n}" value="${data?.inizio || ''}" />
    </div>
    <div class="form-group">
      <label>Scadenza Slot ${n}</label>
      <input type="date" id="slot-scadenza-${n}" value="${data?.scadenza || ''}" />
    </div>
    <div class="form-group">
      <label>Importo (€)</label>
      <input type="number" id="slot-importo-${n}" step="0.01" value="${data?.importo || ''}" />
    </div>
    <div class="form-group">
      <label>Tipo</label>
      <select id="slot-tipo-${n}">
        <option ${data?.tipo === 'Competitiva' ? 'selected' : ''}>Competitiva</option>
        <option ${data?.tipo === 'Non competitiva' ? 'selected' : ''}>Non competitiva</option>
      </select>
    </div>
    <button class="btn btn-danger" onclick="document.getElementById('slot-${n}').remove()" style="height:36px;">✕</button>
  `;
  document.getElementById('slots-container').appendChild(div);
}

async function salvaGara() {
  const nome = document.getElementById('gara-nome').value.trim();
  if (!nome) { alert('Il nome della gara è obbligatorio.'); return; }

  const slots = [];
  document.querySelectorAll('#slots-container .slot-row').forEach(row => {
    const n = row.id.split('-')[1];
    const scadenza = document.getElementById(`slot-scadenza-${n}`).value;
    if (scadenza) {
      slots.push({
        inizio: document.getElementById(`slot-inizio-${n}`).value,
        scadenza,
        importo: document.getElementById(`slot-importo-${n}`).value,
        tipo: document.getElementById(`slot-tipo-${n}`).value,
      });
    }
  });

  const id = document.getElementById('gara-id').value || Date.now().toString();
  const gara = {
    id, nome,
    data: document.getElementById('gara-data').value,
    ora: document.getElementById('gara-ora').value,
    localita: document.getElementById('gara-localita').value,
    distanza: document.getElementById('gara-distanza').value,
    sito: document.getElementById('gara-sito').value,
    facebook: document.getElementById('gara-facebook').value,
    regolamento: document.getElementById('gara-regolamento').value,
    slots,
  };

  const idx = gare.findIndex(g => g.id === id);
  if (idx >= 0) gare[idx] = gara; else gare.push(gara);

  await api('/gare', 'POST', gare);
  closeModal('modal-gara');
  renderGare();
}

async function eliminaGara(id) {
  if (!confirm('Eliminare questa gara?')) return;
  gare = gare.filter(g => g.id !== id);
  iscritti = iscritti.filter(i => i.garaId !== id);
  await api('/gare', 'POST', gare);
  await api('/iscritti', 'POST', iscritti);
  renderGare();
  renderIscritti();
  renderDaIscrivere();
}

// ===== ISCRITTI =====
function renderIscritti() {
  const search = document.getElementById('search-iscritti').value.toLowerCase();
  const filtered = iscritti.filter(i =>
    i.nome.toLowerCase().includes(search) ||
    (gare.find(g => g.id === i.garaId)?.nome || '').toLowerCase().includes(search)
  );
  const el = document.getElementById('lista-iscritti');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty">Nessun iscritto trovato.</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Nominativo</th><th>Gara</th><th>Slot Scadenza</th><th>Stato</th><th>Pagamento</th><th>Azioni</th></tr></thead>
    <tbody>${filtered.map(i => {
      const gara = gare.find(g => g.id === i.garaId);
      const statoClass = i.stato === 'Iscritto ufficialmente' ? 'badge-green' : 'badge-orange';
      const pagClass = i.pagamento === 'Pagato' ? 'badge-green' : 'badge-red';
      return `<tr>
        <td>${i.nome}</td>
        <td>${gara?.nome || 'N/D'}</td>
        <td>${i.slotScadenza || 'N/D'}</td>
        <td><span class="badge ${statoClass}">${i.stato}</span></td>
        <td><span class="badge ${pagClass}">${i.pagamento}</span></td>
        <td>
          <button class="btn btn-warning" onclick="openModalIscritto('${i.id}')">✏️</button>
          <button class="btn btn-danger" onclick="eliminaIscritto('${i.id}')">🗑️</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function openModalIscritto(id = null) {
  const selGara = document.getElementById('iscritto-gara');
  selGara.innerHTML = gare.map(g => `<option value="${g.id}">${g.nome}</option>`).join('');
  if (id) {
    const i = iscritti.find(x => x.id === id);
    document.getElementById('modal-iscritto-title').textContent = 'Modifica Iscritto';
    document.getElementById('iscritto-id').value = i.id;
    document.getElementById('iscritto-nome').value = i.nome;
    selGara.value = i.garaId;
    aggiornaSlotSelect(i.garaId, i.slotScadenza);
    document.getElementById('iscritto-stato').value = i.stato;
    document.getElementById('iscritto-pagamento').value = i.pagamento;
    document.getElementById('iscritto-note').value = i.note || '';
  } else {
    document.getElementById('modal-iscritto-title').textContent = 'Nuovo Iscritto';
    document.getElementById('iscritto-id').value = '';
    document.getElementById('iscritto-nome').value = '';
    document.getElementById('iscritto-stato').value = 'Da iscrivere';
    document.getElementById('iscritto-pagamento').value = 'Non pagato';
    document.getElementById('iscritto-note').value = '';
    if (gare.length > 0) aggiornaSlotSelect(gare[0].id);
  }
  selGara.onchange = () => aggiornaSlotSelect(selGara.value);
  document.getElementById('modal-iscritto').classList.add('open');
}

function aggiornaSlotSelect(garaId, selected = null) {
  const gara = gare.find(g => g.id === garaId);
  const sel = document.getElementById('iscritto-slot');
  sel.innerHTML = (gara?.slots || []).map(s =>
    `<option value="${s.scadenza}" ${s.scadenza === selected ? 'selected' : ''}>Scad. ${s.scadenza} — €${s.importo} — ${s.tipo}</option>`
  ).join('') || '<option value="">Nessuno slot</option>';
}

async function salvaIscritto() {
  const nome = document.getElementById('iscritto-nome').value.trim();
  if (!nome) { alert('Il nominativo è obbligatorio.'); return; }
  const id = document.getElementById('iscritto-id').value || Date.now().toString();
  const garaId = document.getElementById('iscritto-gara').value;
  const iscritto = {
    id, nome, garaId,
    slotScadenza: document.getElementById('iscritto-slot').value,
    stato: document.getElementById('iscritto-stato').value,
    pagamento: document.getElementById('iscritto-pagamento').value,
    note: document.getElementById('iscritto-note').value,
  };
  const idx = iscritti.findIndex(i => i.id === id);
  if (idx >= 0) iscritti[idx] = iscritto; else iscritti.push(iscritto);
  await api('/iscritti', 'POST', iscritti);
  closeModal('modal-iscritto');
  renderIscritti();
  renderDaIscrivere();
}

async function eliminaIscritto(id) {
  if (!confirm('Eliminare questo iscritto?')) return;
  iscritti = iscritti.filter(i => i.id !== id);
  await api('/iscritti', 'POST', iscritti);
  renderIscritti();
  renderDaIscrivere();
}

// ===== DA ISCRIVERE =====
function renderDaIscrivere() {
  const daIscrivere = iscritti.filter(i => i.stato === 'Da iscrivere');
  const el = document.getElementById('lista-daIscrivere');
  if (daIscrivere.length === 0) { el.innerHTML = '<div class="empty">✅ Nessun atleta da iscrivere ufficialmente.</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Nominativo</th><th>Gara</th><th>Scadenza Slot</th><th>Pagamento</th><th>Note</th><th>Azioni</th></tr></thead>
    <tbody>${daIscrivere.map(i => {
      const gara = gare.find(g => g.id === i.garaId);
      const pagClass = i.pagamento === 'Pagato' ? 'badge-green' : 'badge-red';
      return `<tr>
        <td><strong>${i.nome}</strong></td>
        <td>${gara?.nome || 'N/D'}</td>
        <td>${i.slotScadenza || 'N/D'}</td>
        <td><span class="badge ${pagClass}">${i.pagamento}</span></td>
        <td>${i.note || ''}</td>
        <td><button class="btn btn-success" onclick="marcaIscritto('${i.id}')">✅ Iscritto</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

async function marcaIscritto(id) {
  const i = iscritti.find(x => x.id === id);
  if (!i) return;
  i.stato = 'Iscritto ufficialmente';
  await api('/iscritti', 'POST', iscritti);
  renderIscritti();
  renderDaIscrivere();
}

// ===== UTILITY =====
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

window.onload = async () => {
  const token = localStorage.getItem('camelot_token');
  if (token) {
    TOKEN = token;
    const ok = await testToken();
    if (ok) { avviaApp(); return; }
  }
  document.getElementById('login-screen').style.display = 'flex';
};
</script>
